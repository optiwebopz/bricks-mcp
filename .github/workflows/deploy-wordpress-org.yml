# Deploys the plugin to WordPress.org SVN (free/open-source distribution).
#
# Note: release.yml handles GitHub Releases for the license-gated paid distribution.
# Both workflows trigger on the same tag pattern (v*), so a single tag push
# will simultaneously publish to WordPress.org and create a GitHub Release.
#
# WordPress.org plugin slug: bricks-mcp
# Required repository secrets: SVN_USERNAME, SVN_PASSWORD

name: Deploy to WordPress.org

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy plugin to WordPress.org
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
